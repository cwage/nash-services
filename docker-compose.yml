services:
  api:
    build: .
    ports:
      - "5010:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - DISPATCH_CACHE_DB=/data/service_cache.db
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO=${GITHUB_REPO:-cwage/nash-services}
    volumes:
      - ./data:/data
    user: "${UID:-1000}:${GID:-1000}"

  fly:
    image: flyio/flyctl:v0.4.25
    environment:
      - FLY_API_TOKEN=${FLY_API_TOKEN:-}
    volumes:
      - .:/app
      - fly-config:/root/.fly
    working_dir: /app
    profiles:
      - fly

  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-noble
    depends_on:
      - api
    working_dir: /tests
    volumes:
      - ./tests:/tests
    environment:
      - BASE_URL=http://api:5000
    entrypoint: ["tail", "-f", "/dev/null"]
    user: "${UID:-1000}:${GID:-1000}"

volumes:
  fly-config:

