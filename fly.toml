# fly.toml app configuration file generated for nash-services on 2026-03-20T02:31:04Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nash-services'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']


[env]
  DISPATCH_CACHE_DB = '/data/service_cache.db'

[mounts]
  source = 'nash_cache'
  destination = '/data'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
