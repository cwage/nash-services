    # ~40 records (real-time, fluctuates)

  - name: Metro_Water_Services_Outages_Feature_Layer_view2
    category: Active / Real-Time
    mode: point
    address_field: Address
    description: Water service outages
    about: >-
      Active Metro Water outage locations — main breaks, service interruptions,
      and boil advisories. Often empty when there are no active outages.
    poll: true
    # ~0 records (real-time, fluctuates)

  - name: NERVE_Road_Closures_view
    category: Active / Real-Time
    mode: centroid
    address_field: street
    description: Active road closures
    about: >-
      Current road closures managed by Nashville's NERVE center (Nashville
      Emergency Response & Vital Events). Includes construction, events,
      and emergency closures.
