    # ~20 records (real-time, fluctuates)

  - name: TransportationHazardReports_public
    category: Active / Real-Time
    mode: point
    description: Transportation hazard reports
    about: >-
      Citizen-reported road hazards — potholes, debris, signal outages,
      downed signs, and other transportation safety issues.
