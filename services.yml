# Curated list of Nashville Open Data services suitable for proximity search.
# Only services with point geometry or geocodable address fields are included.
#
# mode:
#   point    - service has lat/lng geometry built in
#   geocode  - service has address strings only; requires geocoding
#   centroid - service has polygon/line geometry; uses shape centroid
#
# date_field:
#   When set, the UI shows a date range picker and queries filter on this field.
#   Only set this for services where the date represents a meaningful event time
#   (not admin/audit metadata like created_date or last_edited_date).
#
# To add a new service, find its name via the ArcGIS catalog:
#   curl -s "https://services2.arcgis.com/HdTo6HJqh92wn4D8/arcgis/rest/services?f=json"

services:

  # === Active / Real-Time ===

  - name: Metro_Nashville_Police_Department_Active_Dispatch_Table_view
    category: Active / Real-Time
    mode: geocode
    address_field: Location
    date_field: CallReceivedTime
    description: MNPD active dispatch calls
    poll: true

