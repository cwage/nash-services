<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nash Services - Nashville Open Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="sidebar">
        <h1>Nash Services</h1>
        <p class="subtitle">Nashville Open Data proximity search</p>

        <div class="control-group">
            <label for="service-search">Dataset</label>
            <div class="service-combobox">
                <input type="text" id="service-search" placeholder="Search datasets..." autocomplete="off" />
                <div id="service-dropdown" class="service-dropdown"></div>
            </div>
            <div id="service-selected" class="service-selected"></div>
            <select id="service-select" style="display:none">
                <option value="">Loading services...</option>
            </select>
        </div>

        <div class="control-group">
            <label for="address-input">Address</label>
            <input type="text" id="address-input" placeholder="e.g. 1000 Broadway, Nashville" />
        </div>

        <div class="control-group">
            <label for="radius-input">Radius (miles)</label>
            <div class="radius-row">
                <input type="range" id="radius-slider" min="0.25" max="10" step="0.25" value="2" />
                <input type="number" id="radius-input" min="0.25" max="10" step="0.25" value="2" />
            </div>
        </div>

        <div id="date-range" class="control-group" style="display:none">
            <label>Date range</label>
            <div class="date-row">
                <button type="button" id="date-prev" class="date-nav" title="Previous period">&larr;</button>
                <input type="datetime-local" id="date-from" />
                <span class="date-sep">to</span>
                <input type="datetime-local" id="date-to" />
                <button type="button" id="date-next" class="date-nav" title="Next period">&rarr;</button>
            </div>
        </div>

        <button id="search-btn" disabled>Search</button>

        <div id="status" class="status"></div>

        <div id="results-list"></div>

        <div id="bug-report-link">
            <button type="button" id="bug-report-open">Found a problem? Let us know</button>
        </div>
    </div>

    <!-- Bug report modal -->
    <div id="bug-modal-overlay" class="bug-modal-overlay">
        <div class="bug-modal" role="dialog" aria-modal="true" aria-labelledby="bug-modal-title" aria-describedby="bug-modal-description">
            <h2 id="bug-modal-title">Report a Problem</h2>
            <p id="bug-modal-description" class="bug-modal-desc">Describe what went wrong and we'll look into it. Your current search details will be included automatically.</p>
            <form id="bug-report-form">
                <label for="bug-description">What happened?</label>
                <textarea id="bug-description" rows="4" placeholder="e.g. I searched for an address and got no results, but I know there should be data here..." required></textarea>
                <div id="bug-debug-preview" class="bug-debug-preview"></div>
                <p class="bug-disclaimer">This will create a public report on GitHub. Please don't include personal or sensitive information.</p>
                <div class="bug-modal-actions">
                    <button type="button" id="bug-cancel">Cancel</button>
                    <button type="submit" id="bug-submit">Submit Report</button>
                </div>
                <div id="bug-status" class="bug-status"></div>
            </form>
        </div>
    </div>

    <div id="map"></div>

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "4e056dcb7083453f88c6730062224710"}'></script>
    <!-- End Cloudflare Web Analytics -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
