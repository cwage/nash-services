<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nash Services - Nashville Open Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="sidebar">
        <h1>Nash Services</h1>
        <p class="subtitle">Nashville Open Data proximity search</p>

        <div id="featured" class="control-group">
            <label>Featured</label>
            <div id="featured-list"></div>
        </div>

        <div class="control-group">
            <label for="service-search">Dataset</label>
            <div class="service-combobox">
                <input type="text" id="service-search" placeholder="Search datasets..." autocomplete="off" />
                <div id="service-dropdown" class="service-dropdown"></div>
            </div>
            <div id="service-selected" class="service-selected"></div>
            <select id="service-select" style="display:none">
                <option value="">Loading services...</option>
            </select>
        </div>

        <div class="control-group">
            <label for="address-input">Address</label>
            <input type="text" id="address-input" placeholder="e.g. 1000 Broadway, Nashville" />
        </div>

        <div class="control-group">
            <label for="radius-input">Radius (miles)</label>
            <div class="radius-row">
                <input type="range" id="radius-slider" min="0.25" max="10" step="0.25" value="2" />
                <input type="number" id="radius-input" min="0.25" max="10" step="0.25" value="2" />
            </div>
        </div>

        <div id="date-range" class="control-group" style="display:none">
            <label>Date range</label>
            <div class="date-row">
                <button type="button" id="date-prev" class="date-nav" title="Previous period">&larr;</button>
                <input type="datetime-local" id="date-from" />
                <span class="date-sep">to</span>
                <input type="datetime-local" id="date-to" />
                <button type="button" id="date-next" class="date-nav" title="Next period">&rarr;</button>
            </div>
        </div>

        <button id="search-btn" disabled>Search</button>

        <div id="status" class="status"></div>

        <div id="results-list"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
