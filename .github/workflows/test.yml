name: Fast tests (PR)

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: cd tests && npm ci

      - name: Start services
        run: |
          mkdir -p data && chmod 777 data
          docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" 2>/dev/null; then
              echo "API is up"
              break
            fi
            echo "  attempt $i"
            sleep 2
          done
          if ! docker compose exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')" 2>/dev/null; then
            echo "API failed to start"
            exit 1
          fi

      - name: Run Playwright tests (fast suite)
        run: |
          docker compose exec -T -u "$(id -u):$(id -g)" playwright npx playwright test --project=fast

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
