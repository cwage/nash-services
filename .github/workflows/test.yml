name: Run Playwright tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          mkdir -p data && chmod 777 data
          chmod 777 tests
          docker compose up -d --build

      - name: Wait for API to be healthy with cache populated
        run: |
          echo "Waiting for API and cache..."
          for i in $(seq 1 60); do
            TOTAL=$(docker compose exec -T api python -c "from dispatch_cache import get_cache_stats; print(get_cache_stats()['total'])" 2>&1 || echo "0")
            if [ "$TOTAL" -gt "0" ] 2>/dev/null; then
              echo "Cache populated with $TOTAL events"
              break
            fi
            echo "  attempt $i: $TOTAL"
            sleep 5
          done

      - name: Install Playwright dependencies
        run: docker compose exec -T playwright npm install --prefix /tests

      - name: Run Playwright tests
        run: |
          docker compose exec -T playwright npx playwright test \
            core.spec.js \
            date-nav.spec.js \
            date-filter-config.spec.js \
            polled-services.spec.js \
            bombing-preset.spec.js \
            timezone.spec.js \
            url-load.spec.js \
            clear-map.spec.js

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
